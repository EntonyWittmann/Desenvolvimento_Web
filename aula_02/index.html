<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Pagina de cadastro</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <header>
            <h1>Página de cadastro</h1>
        </header>
        <form> 
            <fieldset>
                <legend>Crie sua conta</legend>
                
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome...">
                    <br><br>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@dominio.com" required>
                    <br><br>
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" minlength="8" name="senha" placeholder="Minimo de 8 caracteres..." required>

                        <p><strong>Gênero:</strong></p>
                        <input type="radio" id="masculino" name="genero" value="masculino">
                        <label for="masculino">Masculino</label>
                        <br>
                        <input type="radio" id="feminino" name="genero" value="feminino">
                        <label for="feminino">Feminino</label>
                        <br>
                        <input type="radio" id="outro" name="genero" value="outro">
                        <label for="outro">Outro</label>
                        <br>

                    <p>Biografia:</p>
                        <textarea id="biografia" name="biografia" rows="4" cols="50" placeholder="Conte um pouco sobre você..." style="resize: none;"></textarea>
                        <br><br>

                        <input type="checkbox" id="termos" name="termos" value="aceito" required>
                        <label for="termos">Aceito os termos e condições</label>
                        <br><br>

                        <input type="submit" value="Cadastrar">
                        <input type="reset" value="Limpar">

            </fieldset>
        </form>
    </body>
</html>
